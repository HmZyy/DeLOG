# DeLOG cargo config.
#
# The `python` feature of `delog-script` embeds CPython via pyo3. On this dev
# machine the interpreter is a mise-managed shared build; without this config
# pyo3 links the *system* libpython (`/usr/lib/libpython3.14.so.1.0`), whose
# built-in module table does not match the mise stdlib on `sys.path` — numpy's
# C extensions then fail to import (`No module named 'math'`).
#
# Pin pyo3 to the mise interpreter and add its libdir to the binary rpath so the
# matching libpython is loaded at runtime. This only affects the `python`
# feature; the default `cargo build --workspace` needs no Python toolchain.
[env]
PYO3_PYTHON = "/home/hamza/.local/share/mise/installs/python/3.14.1/bin/python3"

[build]
rustflags = [
    "-C",
    "link-args=-Wl,-rpath,/home/hamza/.local/share/mise/installs/python/3.14.1/lib",
]
