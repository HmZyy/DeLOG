name: CI

on:
  push:
    branches: [main, rework]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Pinned deps (PLAN.md §2): the lockfile is authoritative.
  CARGO_NET_RETRY: "3"

jobs:
  check:
    name: fmt + clippy + test + bench-compile (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system libraries (eframe/wgpu, serialport)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxkbcommon-dev libwayland-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libgl1-mesa-dev libudev-dev

      - name: Install Rust (pinned via rust-toolchain.toml)
        run: rustup show active-toolchain || rustup toolchain install

      - uses: Swatinem/rust-cache@v2

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: tests
        run: cargo test --workspace --locked

      - name: bench compile
        run: cargo bench --workspace --no-run --locked

  fuzz-smoke:
    name: fuzz smoke (60 s per target)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # The fuzz crate only depends on delog-core + delog-parsers (no
      # eframe/wgpu/serialport), so no system libraries are needed.
      - name: Install nightly (cargo-fuzz requires the sanitizer)
        run: rustup toolchain install nightly --profile minimal --component rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "fuzz -> target"

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz

      # PLAN.md §20.4: 60 s smoke per frame decoder. A crash, panic, OOM, or
      # hang (libFuzzer's -timeout) fails the job — the §6.1 policy, enforced.
      #
      # `+nightly` is mandatory: cargo-fuzz emits `-Zsanitizer=address`, but the
      # root rust-toolchain.toml pins stable 1.96.0 and a toolchain file outranks
      # `rustup default`. The `+nightly` override sets RUSTUP_TOOLCHAIN, which
      # outranks the toolchain file and propagates into cargo-fuzz's inner build.
      - name: fuzz BIN record
        run: cargo +nightly fuzz run bin_record -- -max_total_time=60 -timeout=20 -rss_limit_mb=2048
      - name: fuzz ULog defs+data
        run: cargo +nightly fuzz run ulog_defs_data -- -max_total_time=60 -timeout=20 -rss_limit_mb=2048
      - name: fuzz MAVLink framing
        run: cargo +nightly fuzz run mavlink_framing -- -max_total_time=60 -timeout=20 -rss_limit_mb=2048
