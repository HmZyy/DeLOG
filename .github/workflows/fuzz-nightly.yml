name: Fuzz (nightly long run)

# TST-06: the CI smoke (60 s/target in ci.yml) catches regressions per push;
# this runs each frame decoder far longer once a day to dig deeper. Crashing
# inputs are uploaded as artifacts for reproduction with `cargo fuzz run`.
on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  fuzz:
    name: fuzz ${{ matrix.target }} (15 min)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [bin_record, ulog_defs_data, mavlink_framing]
    steps:
      - uses: actions/checkout@v5

      - name: Install nightly
        run: rustup toolchain install nightly --profile minimal --component rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "fuzz -> target"

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz

      # See ci.yml for why `+nightly` and `--target x86_64-unknown-linux-gnu`
      # are both required (toolchain-file override + musl/sanitizer incompat).
      - name: fuzz ${{ matrix.target }}
        run: cargo +nightly fuzz run --target x86_64-unknown-linux-gnu ${{ matrix.target }} -- -max_total_time=900 -timeout=20 -rss_limit_mb=2048

      - name: Upload crashing inputs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: fuzz/artifacts/${{ matrix.target }}/
          if-no-files-found: ignore
