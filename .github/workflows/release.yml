name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # required to create the release and upload assets

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: "3"

jobs:
  build:
    name: build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
            bin: delog
          - os: windows-latest
            name: windows-x86_64
            bin: delog.exe
    steps:
      - uses: actions/checkout@v5

      - name: Install system libraries (eframe/wgpu, serialport)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxkbcommon-dev libwayland-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libgl1-mesa-dev libudev-dev

      - name: Install Rust (pinned via rust-toolchain.toml)
        run: rustup show active-toolchain || rustup toolchain install

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked -p delog-app

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          staging="delog-${GITHUB_REF_NAME}-${{ matrix.name }}"
          mkdir "$staging"
          cp "target/release/${{ matrix.bin }}" "$staging"/
          tar czf "$staging.tar.gz" "$staging"
          echo "ASSET=$staging.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $staging = "delog-${env:GITHUB_REF_NAME}-${{ matrix.name }}"
          New-Item -ItemType Directory -Path $staging | Out-Null
          Copy-Item "target/release/${{ matrix.bin }}" $staging
          Compress-Archive -Path $staging -DestinationPath "$staging.zip"
          "ASSET=$staging.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
